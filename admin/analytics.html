<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — DigitalStore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#fafafa;--line:#e7e7ea;--line2:#d4d4d8;--text:#0a0a0a;--text2:#52525b;--text3:#a1a1aa;--up:#15803d;--down:#b91c1c;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:20px 18px 60px}
.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.top h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-right:auto;display:flex;align-items:center;gap:10px}
.btn{padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{border-color:var(--line2);background:var(--bg2)}
.lang{display:flex;gap:4px}
.lang button{padding:6px 11px;border:1px solid var(--line);background:#fff;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit}
.lang button.on{background:var(--text);color:#fff;border-color:var(--text)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.filters button{padding:7px 16px;border:1px solid var(--line);background:#fff;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit}
.filters button.on{background:var(--text);color:#fff;border-color:var(--text)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.kpi .lbl{font-size:11.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-top:6px}
.kpi .trend{font-size:12px;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.trend.up{color:var(--up)} .trend.down{color:var(--down)} .trend.flat{color:var(--text3)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px;margin-bottom:18px}
.card h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.funnel{display:flex;flex-direction:column;gap:10px}
.fstage{}
.fstage .frow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.fstage .fname{font-weight:600}
.fstage .fbar{height:30px;background:var(--text);border-radius:7px;min-width:2px;transition:width .4s;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:12px;font-weight:600}
.fstage .fdrop{font-size:11.5px;color:var(--text3);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 8px;border-bottom:2px solid var(--line);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;white-space:nowrap}
td{padding:8px 8px;border-bottom:1px solid var(--line)}
td.num,th.num{text-align:right}
code{background:var(--bg2);padding:2px 6px;border-radius:5px;font-size:12px}
canvas{max-height:260px}
.muted{color:var(--text3);text-align:center;padding:18px}
.danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.gate{max-width:440px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center}
.hidden{display:none!important}
.foot-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
</style>
</head>
<body>
<div id="gate" class="gate hidden">
  <h1 style="font-size:18px;margin-bottom:10px"><i class="fa-solid fa-lock"></i> <span id="g_title">Chưa kết nối</span></h1>
  <p id="g_msg" style="color:var(--text2);margin-bottom:18px"></p>
  <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-left"></i> <span id="g_back">Mở Admin để kết nối</span></a>
</div>

<div id="app" class="wrap hidden">
  <div class="top">
    <h1><i class="fa-solid fa-chart-line"></i> <span data-i="title">Phân tích bán hàng</span></h1>
    <div class="lang" id="langSwitch">
      <button data-l="vi" class="on">VI</button><button data-l="de">DE</button><button data-l="en">EN</button>
    </div>
    <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-left"></i> <span data-i="back">Admin</span></a>
  </div>

  <div class="filters" id="filters">
    <button data-d="1" data-i="today">Hôm nay</button>
    <button data-d="7" class="on" data-i="d7">7 ngày</button>
    <button data-d="30" data-i="d30">30 ngày</button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="card">
    <h2 data-i="funnel">Phễu chuyển đổi</h2>
    <div class="funnel" id="funnel"></div>
  </div>

  <div class="grid2">
    <div class="card"><h2 data-i="revchart">Doanh thu theo ngày</h2><canvas id="chRev"></canvas></div>
    <div class="card"><h2 data-i="sesschart">Phiên truy cập theo ngày</h2><canvas id="chSess"></canvas></div>
  </div>

  <div class="card">
    <h2 data-i="byproduct">Doanh thu theo sản phẩm</h2>
    <div style="overflow-x:auto"><table id="tblProd"><thead><tr>
      <th data-i="product">Sản phẩm</th><th class="num" data-i="units">SL</th><th class="num" data-i="revenue">Doanh thu</th><th class="num" data-i="clicks">Click</th><th class="num" data-i="cr">CR</th>
    </tr></thead><tbody id="bodyProd"></tbody></table></div>
  </div>

  <div class="grid2">
    <div class="card"><h2 data-i="topsold">Bán chạy</h2><div style="overflow-x:auto"><table><tbody id="bodySold"></tbody></table></div></div>
    <div class="card"><h2 data-i="topclick">Click nhiều</h2><div style="overflow-x:auto"><table><tbody id="bodyClick"></tbody></table></div></div>
  </div>

  <div class="card">
    <h2 data-i="coupons">Hiệu suất mã giảm giá</h2>
    <div class="kpis" id="cpKpi" style="margin-bottom:14px"></div>
    <div style="overflow-x:auto"><table><thead><tr><th data-i="code">Mã</th><th class="num" data-i="uses">Lượt dùng</th><th class="num" data-i="discount">Đã giảm</th></tr></thead><tbody id="bodyCoupon"></tbody></table></div>
  </div>

  <div class="foot-actions">
    <button class="btn danger" id="del7" data-i="del7">Xóa dữ liệu >7 ngày</button>
    <button class="btn danger" id="delall" data-i="delall">Xóa tất cả</button>
  </div>
</div>

<script>
const I18N={
  vi:{title:'Phân tích bán hàng',back:'Admin',today:'Hôm nay',d7:'7 ngày',d30:'30 ngày',funnel:'Phễu chuyển đổi',revchart:'Doanh thu theo ngày',sesschart:'Phiên truy cập theo ngày',byproduct:'Doanh thu theo sản phẩm',product:'Sản phẩm',units:'SL',revenue:'Doanh thu',clicks:'Click',cr:'CR',topsold:'Bán chạy',topclick:'Click nhiều',coupons:'Hiệu suất mã giảm giá',code:'Mã',uses:'Lượt dùng',discount:'Đã giảm',del7:'Xóa dữ liệu >7 ngày',delall:'Xóa tất cả',
    k_revToday:'Doanh thu hôm nay',k_revMonth:'Doanh thu tháng',k_revTotal:'Tổng doanh thu',k_revRange:'Doanh thu (kỳ)',k_orders:'Số đơn',k_aov:'Giá trị đơn TB',k_conv:'Tỷ lệ chuyển đổi',k_sessions:'Phiên',k_units:'SP bán ra',
    f_impr:'Lượt xem',f_click:'Click',f_cart:'Thêm giỏ',f_order:'Đặt hàng',cp_uses:'Lượt dùng mã',cp_disc:'Tổng đã giảm',novsprev:'so kỳ trước',gateT:'Chưa kết nối',gateM:'Chưa có token admin trên thiết bị này. Hãy mở Admin, vào mục E-Mail/Cài đặt để nhập token một lần, rồi quay lại.',gateB:'Mở Admin',confirmAll:'Xóa TẤT CẢ dữ liệu thống kê?',nodata:'—'},
  de:{title:'Verkaufsanalyse',back:'Admin',today:'Heute',d7:'7 Tage',d30:'30 Tage',funnel:'Conversion-Funnel',revchart:'Umsatz pro Tag',sesschart:'Sitzungen pro Tag',byproduct:'Umsatz pro Produkt',product:'Produkt',units:'Anz.',revenue:'Umsatz',clicks:'Klicks',cr:'CR',topsold:'Bestseller',topclick:'Meiste Klicks',coupons:'Rabattcode-Leistung',code:'Code',uses:'Nutzungen',discount:'Rabatt',del7:'Daten >7 Tage löschen',delall:'Alle löschen',
    k_revToday:'Umsatz heute',k_revMonth:'Umsatz Monat',k_revTotal:'Gesamtumsatz',k_revRange:'Umsatz (Zeitraum)',k_orders:'Bestellungen',k_aov:'Ø Bestellwert',k_conv:'Conversion-Rate',k_sessions:'Sitzungen',k_units:'Verkauft',
    f_impr:'Impressionen',f_click:'Klicks',f_cart:'In den Warenkorb',f_order:'Bestellungen',cp_uses:'Code-Nutzungen',cp_disc:'Gesamtrabatt',novsprev:'vs. Vorperiode',gateT:'Nicht verbunden',gateM:'Kein Admin-Token auf diesem Gerät. Öffne Admin, gib im E-Mail/Einstellungen-Bereich einmal den Token ein und komm zurück.',gateB:'Admin öffnen',confirmAll:'ALLE Statistikdaten löschen?',nodata:'—'},
  en:{title:'Sales analytics',back:'Admin',today:'Today',d7:'7 days',d30:'30 days',funnel:'Conversion funnel',revchart:'Revenue per day',sesschart:'Sessions per day',byproduct:'Revenue per product',product:'Product',units:'Qty',revenue:'Revenue',clicks:'Clicks',cr:'CR',topsold:'Best sellers',topclick:'Most clicked',coupons:'Coupon performance',code:'Code',uses:'Uses',discount:'Discount',del7:'Delete data >7 days',delall:'Delete all',
    k_revToday:'Revenue today',k_revMonth:'Revenue month',k_revTotal:'Total revenue',k_revRange:'Revenue (range)',k_orders:'Orders',k_aov:'Avg order value',k_conv:'Conversion rate',k_sessions:'Sessions',k_units:'Units sold',
    f_impr:'Impressions',f_click:'Clicks',f_cart:'Add to cart',f_order:'Orders',cp_uses:'Coupon uses',cp_disc:'Total discount',novsprev:'vs previous',gateT:'Not connected',gateM:'No admin token on this device. Open Admin, enter the token once in the E-Mail/Settings area, then come back.',gateB:'Open Admin',confirmAll:'Delete ALL analytics data?',nodata:'—'},
};
let LANG=localStorage.getItem('pm_admin_lang')||'vi'; if(!I18N[LANG])LANG='vi';
let DAYS=7, chRev=null, chSess=null, lastData=null;
const $=s=>document.querySelector(s);
const T=k=>(I18N[LANG]||I18N.vi)[k]||k;
const eur=n=>'€'+(Number(n)||0).toFixed(2);
const creds=()=>({url:(localStorage.getItem('pm_worker_url')||'https://store.tdh1812.workers.dev').replace(/\/$/,''),tok:(localStorage.getItem('pm_admin_token')||'')});
function applyI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i]').forEach(el=>{ const v=T(el.getAttribute('data-i')); if(v) el.textContent=v; });
  document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('on',b.dataset.l===LANG));
}
async function api(path,opts){ opts=opts||{}; const c=creds(); const r=await fetch(c.url+path,{...opts,headers:{'x-admin-token':c.tok,...(opts.body?{'Content-Type':'application/json'}:{}),...(opts.headers||{})}}); if(!r.ok){const e=new Error('HTTP '+r.status);e.status=r.status;throw e;} return r.json(); }
function trend(cur,prev){
  if(prev===0 || prev==null) return cur>0?{c:'up',t:'▲ +100%'}:{c:'flat',t:'–'};
  const p=((cur-prev)/prev*100); const cls=p>0.5?'up':(p<-0.5?'down':'flat'); const arr=p>0.5?'▲':(p<-0.5?'▼':'–');
  return {c:cls,t:arr+' '+(p>0?'+':'')+p.toFixed(0)+'%'};
}
function kpiCard(lbl,val,cur,prev){ const tr=trend(cur,prev); return `<div class="kpi"><div class="lbl">${lbl}</div><div class="val">${val}</div><div class="trend ${tr.c}">${tr.t}<span style="color:var(--text3);font-weight:400"> ${T('novsprev')}</span></div></div>`; }
function evMap(arr){ const m={}; (arr||[]).forEach(r=>m[r.type]=r.c); return m; }
function renderFunnel(d){
  const ev=evMap(d.eventTotals); const stages=[['f_impr',ev.impression||0],['f_click',ev.click||0],['f_cart',ev.add_cart||0],['f_order',d.kpi.ordersRange||0]];
  const max=Math.max(1,stages[0][1]);
  $('#funnel').innerHTML=stages.map((s,i)=>{ const v=s[1]; const w=Math.max(2,(v/max*100)); const prev=i>0?stages[i-1][1]:null; const drop=(prev!=null&&prev>0)?(((prev-v)/prev)*100):null;
    return `<div class="fstage"><div class="frow"><span class="fname">${T(s[0])}</span><span>${v}</span></div><div class="fbar" style="width:${w}%">${w>12?v:''}</div>${drop!=null?`<div class="fdrop">▼ ${drop.toFixed(0)}% ${LANG==='de'?'Absprung':(LANG==='en'?'drop-off':'rớt')}</div>`:''}</div>`;
  }).join('');
}
function pname(id){ return '#'+id; }
function sortRows(rows,key,dir){ return rows.slice().sort((a,b)=>dir*((+b[key]||0)-(+a[key]||0))); }
function render(d){
  lastData=d; const k=d.kpi, p=d.prev||{};
  $('#kpis').innerHTML=[
    [T('k_revRange'),eur(k.revenueRange),k.revenueRange,p.revenue],
    [T('k_orders'),k.ordersRange,k.ordersRange,p.orders],
    [T('k_aov'),eur(k.aov),k.aov,p.aov],
    [T('k_conv'),(k.conversion||0).toFixed(1)+'%',k.conversion,p.conversion],
    [T('k_sessions'),k.sessions,k.sessions,p.sessions],
    [T('k_units'),k.unitsRange||0,k.unitsRange,p.units],
    [T('k_revToday'),eur(k.revenueToday),null,null],
    [T('k_revMonth'),eur(k.revenueMonth),null,null],
  ].map(x=> (x[2]==null) ? `<div class="kpi"><div class="lbl">${x[0]}</div><div class="val">${x[1]}</div></div>` : kpiCard(x[0],x[1],x[2],x[3])).join('');
  renderFunnel(d);
  const labels=(d.series||[]).map(r=>String(r.day).slice(5));
  if(window.Chart){
    if(chRev)chRev.destroy(); chRev=new Chart($('#chRev'),{type:'line',data:{labels,datasets:[{data:(d.series||[]).map(r=>r.rev),borderColor:'#0a0a0a',backgroundColor:'rgba(0,0,0,.06)',fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
    if(chSess)chSess.destroy(); chSess=new Chart($('#chSess'),{type:'bar',data:{labels,datasets:[{data:(d.series||[]).map(r=>r.orders),backgroundColor:'#a1a1aa'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  }
  const clickMap={}; (d.topClicks||[]).forEach(r=>clickMap[r.product_id]=r.c);
  $('#bodyProd').innerHTML=(d.revByProduct||[]).map(r=>{ const cl=clickMap[r.product_id]||0; const cr=cl?((r.q/cl)*100).toFixed(0)+'%':'—'; return `<tr><td>${r.name||pname(r.product_id)}</td><td class="num">${r.q||0}</td><td class="num">${eur(r.rev)}</td><td class="num">${cl}</td><td class="num">${cr}</td></tr>`; }).join('')||`<tr><td colspan="5" class="muted">${T('nodata')}</td></tr>`;
  $('#bodySold').innerHTML=(d.topSold||[]).map(r=>`<tr><td>${r.name||pname(r.product_id)}</td><td class="num">${r.q||0}</td></tr>`).join('')||`<tr><td class="muted">${T('nodata')}</td></tr>`;
  $('#bodyClick').innerHTML=(d.topClicks||[]).map(r=>`<tr><td>${pname(r.product_id)}</td><td class="num">${r.c}</td></tr>`).join('')||`<tr><td class="muted">${T('nodata')}</td></tr>`;
  const cp=d.coupons||{};
  $('#cpKpi').innerHTML=`<div class="kpi"><div class="lbl">${T('cp_uses')}</div><div class="val">${cp.uses||0}</div></div><div class="kpi"><div class="lbl">${T('cp_disc')}</div><div class="val">${eur(cp.discount)}</div></div>`;
  $('#bodyCoupon').innerHTML=(cp.top||[]).map(r=>`<tr><td><code>${r.code}</code></td><td class="num">${r.c}</td><td class="num">${eur(r.d)}</td></tr>`).join('')||`<tr><td colspan="3" class="muted">${T('nodata')}</td></tr>`;
}
async function load(){ try{ const d=await api('/admin/stats?days='+DAYS); if(!d||!d.ok){gate();return;} render(d); }catch(e){ if(e.status===401){gate(true);} } }
function gate(authErr){ $('#app').classList.add('hidden'); const g=$('#gate'); g.classList.remove('hidden'); $('#g_title').textContent=T('gateT'); $('#g_msg').textContent=T('gateM'); $('#g_back').textContent=T('gateB'); }
function boot(){
  applyI18n();
  const c=creds();
  if(!c.tok){ gate(); return; }
  $('#app').classList.remove('hidden');
  document.querySelectorAll('#filters button').forEach(b=>b.onclick=()=>{DAYS=+b.dataset.d;document.querySelectorAll('#filters button').forEach(x=>x.classList.toggle('on',x===b));load();});
  document.querySelectorAll('#langSwitch button').forEach(b=>b.onclick=()=>{LANG=b.dataset.l;localStorage.setItem('pm_admin_lang',LANG);applyI18n();if(lastData)render(lastData);});
  $('#del7').onclick=async()=>{ try{await api('/admin/stats',{method:'DELETE',body:JSON.stringify({olderThanDays:7})});load();}catch(e){} };
  $('#delall').onclick=async()=>{ if(!confirm(T('confirmAll')))return; try{await api('/admin/stats',{method:'DELETE',body:JSON.stringify({all:true})});load();}catch(e){} };
  load();
}
boot();
</script>
</body>
</html>
