<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Analytics — DigitalStore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f1f3f6;--surface:#fff;--line:#e4e7ec;--line2:#cbd2dc;--text:#101828;--text2:#475467;--text3:#98a2b3;--up:#067647;--down:#d92d20;--warn:#b54708;--accent:#101828;--brand:#4f46e5;--brand2:#7c6ff0;--brandsoft:rgba(79,70,229,.10);--row:#f8f9fb;--radius:14px;--shadow:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.05)}
[data-theme="dark"]{--bg:#0d1220;--surface:#151c2e;--line:#232c44;--line2:#344060;--text:#f1f4fa;--text2:#9aa6c0;--text3:#64718f;--up:#34d399;--down:#f87171;--warn:#fbbf24;--accent:#f1f4fa;--brand:#60a5fa;--brand2:#818cf8;--brandsoft:rgba(96,165,250,.14);--row:#18203496;--shadow:0 2px 8px rgba(0,0,0,.45)}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.wrap{max-width:1240px;margin:0 auto;padding:0 18px 60px}
.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:18px 0 14px}
.top h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-right:auto;display:flex;align-items:center;gap:10px}
.btn{padding:8px 13px;border:1px solid var(--line);background:var(--surface);border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:hover{border-color:var(--line2)}
.iconbtn{width:36px;height:36px;justify-content:center;padding:0}
.lang{display:flex;gap:4px}
.lang button{padding:6px 11px;border:1px solid var(--line);background:var(--surface);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit}
.lang button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.hero{background:linear-gradient(120deg,var(--brand),var(--brand2));border-radius:var(--radius);padding:16px 20px;color:#fff;margin-bottom:14px;box-shadow:0 6px 20px var(--brandsoft)}
.hero-t{font-size:16px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.hero-s{font-size:12.5px;opacity:.85;margin-top:3px;font-variant-numeric:tabular-nums}
.filterbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 0 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line);margin-bottom:18px}
.fsep{width:1px;height:22px;background:var(--line2);margin:0 4px}
.dinp{padding:6px 8px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--text);font-family:inherit;font-size:12.5px;outline:none;max-width:135px}
.dapply{padding:7px 13px;border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.ftog{padding:7px 13px;border:1px solid var(--line);background:var(--surface);border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.ftog.on{background:var(--brandsoft);border-color:var(--brand);color:var(--brand)}
body.nocmp .trend{display:none}
@media(max-width:640px){.dinp{max-width:118px;font-size:11.5px}.fsep{display:none}}
.filterbar button{padding:7px 16px;border:1px solid var(--line);background:var(--surface);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit}
.filterbar button.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px var(--brandsoft)}
.alert{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13.5px;display:none;align-items:center;gap:10px}
[data-theme="dark"] .alert{background:#2a1414;border-color:#5b2020;color:#fca5a5}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--brand),var(--brand2));opacity:.85;border-radius:3px 0 0 3px}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(16,24,40,.10)}
[data-theme="dark"] .kpi:hover{box-shadow:0 6px 18px rgba(0,0,0,.5)}
.kpi .lbl{font-size:11.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:6px;font-variant-numeric:tabular-nums}
.kpi .trend{font-size:12px;font-weight:600;margin-top:4px}
.trend.up{color:var(--up)} .trend.down{color:var(--down)} .trend.flat{color:var(--text3)}
.kpi .spark{position:absolute;right:0;bottom:0;width:100%;height:34px;opacity:.5}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h2{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
@media(max-width:640px){
  .wrap{padding:0 12px 50px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .top h1{font-size:17px}
  .kpi .val{font-size:20px}
  canvas{max-height:200px}
  input,select,.psel,.psearch{font-size:16px}
  .card{padding:14px}
  th,td{padding:7px 6px;font-size:12px}
  #tblProd th:first-child,#tblProd td:first-child,#tblCoupon th:first-child,#tblCoupon td:first-child{position:sticky;left:0;background:var(--surface);z-index:1;max-width:130px;overflow:hidden;text-overflow:ellipsis}
}
@media(max-width:430px){
  .pd-grid{grid-template-columns:1fr}
  .pfilter{gap:6px}
  .psearch{min-width:140px}
}
.funnel{display:flex;flex-direction:column;gap:8px}
.fstage .frow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.fstage .fname{font-weight:600}
.fbar-wrap{background:var(--bg);border-radius:8px;overflow:hidden}
.fbar{height:30px;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:8px;min-width:3px;transition:width .5s;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:12px;font-weight:700;box-shadow:0 2px 6px var(--brandsoft)}
.fbar.warn{background:linear-gradient(90deg,#ef4444,#f97316)}
.fdrop{font-size:11.5px;color:var(--text3);margin:3px 0 6px}
.fdrop.bad{color:var(--down);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 8px;border-bottom:2px solid var(--line);color:var(--text2);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
td{padding:9px 8px;border-bottom:1px solid var(--line);white-space:nowrap;font-variant-numeric:tabular-nums}
tbody tr:nth-child(even) td{background:var(--row)}
td.num,th.num{text-align:right}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.badge.best{background:#dcfce7;color:#15803d}.badge.low{background:#fef9c3;color:#854d0e}.badge.notraffic{background:#fee2e2;color:#b91c1c}
[data-theme="dark"] .badge.best{background:#0f2e1a;color:#4ade80}[data-theme="dark"] .badge.low{background:#2e2710;color:#fde047}[data-theme="dark"] .badge.notraffic{background:#2e1414;color:#fca5a5}
code{background:var(--bg);padding:2px 6px;border-radius:5px;font-size:12px}
canvas{max-height:260px}
.muted{color:var(--text3);text-align:center;padding:20px}
.danger{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
[data-theme="dark"] .danger{background:#2a1414;color:#fca5a5;border-color:#5b2020}
.gate{max-width:440px;margin:80px auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center}
.hidden{display:none!important}
.foot-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.skel{background:linear-gradient(90deg,var(--line) 25%,var(--bg) 50%,var(--line) 75%);background-size:200% 100%;animation:sk 1.2s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skline{height:90px;margin-bottom:12px}
.pfilter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.pdk{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.pdk .box{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center}
.pdk .box .v{font-size:21px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.pdk .box .l{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-top:3px}
.pviz{display:grid;grid-template-columns:1fr 1.3fr;gap:14px;margin-bottom:16px}
.pviz .subcard{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.pviz h3{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:10px}
.pviz .subwrap{position:relative;height:230px}
.pviz canvas{max-height:230px}
@media(max-width:820px){.pviz{grid-template-columns:1fr}}
.psearch{flex:1;min-width:180px;max-width:300px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.psel{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer}
.pbtn{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-family:inherit}
.pbtn:hover{border-color:var(--line2)}
.psearch:focus{border-color:var(--line2)}
#tblProd tbody tr{cursor:pointer}
#tblProd tbody tr:hover td{background:var(--brandsoft)}
.pd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
.pd-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:440px;width:100%;box-shadow:var(--shadow)}
.pd-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.pd-head h3{font-size:17px;font-weight:700;margin-right:auto}
.pd-head button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pd-item{background:var(--bg);border-radius:10px;padding:10px 12px}
.pd-item .l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.pd-item .v{font-size:18px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
.pd-item{border-left:3px solid var(--brand)}
</style>
</head>
<body>
<div id="gate" class="gate hidden">
  <h1 style="font-size:18px;margin-bottom:10px"><i class="fa-solid fa-lock"></i> <span id="g_title">Chưa kết nối</span></h1>
  <p id="g_msg" style="color:var(--text2);margin-bottom:18px"></p>
  <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-left"></i> <span id="g_back">Mở Admin</span></a>
</div>

<div id="app" class="wrap hidden">
  <div class="top">
    <h1><i class="fa-solid fa-chart-line"></i> <span data-i="title">Phân tích bán hàng</span></h1>
    <div class="lang" id="langSwitch"><button data-l="vi" class="on">VI</button><button data-l="de">DE</button><button data-l="en">EN</button></div>
    <button class="btn iconbtn" id="themeBtn" title="Theme"><i class="fa-solid fa-moon"></i></button>
    <a class="btn" href="./index.html"><i class="fa-solid fa-arrow-left"></i> <span data-i="back">Admin</span></a>
  </div>

  <div class="hero">
    <div class="hero-t"><i class="fa-solid fa-chart-pie"></i> <span data-i="heroT">Tổng quan hiệu suất</span></div>
    <div class="hero-s" id="rangeLabel"></div>
  </div>

  <div class="filterbar" id="filters">
    <button data-d="1" data-i="today">Hôm nay</button>
    <button data-d="7" class="on" data-i="d7">7 ngày</button>
    <button data-d="30" data-i="d30">30 ngày</button>
    <span class="fsep"></span>
    <input type="date" id="dFrom" class="dinp" title="Von">
    <span style="color:var(--text3)">→</span>
    <input type="date" id="dTo" class="dinp" title="Bis">
    <button id="dApply" class="dapply" data-i="apply">Áp dụng</button>
    <span class="fsep"></span>
    <button id="cmpBtn" class="ftog on" title=""><i class="fa-solid fa-arrow-trend-up"></i> <span data-i="compare">So sánh kỳ trước</span></button>
    <button id="csvBtn" class="ftog" title=""><i class="fa-solid fa-file-csv"></i> <span data-i="exportcsv">Xuất CSV</span></button>
    <button id="reloadBtn" class="ftog" title="Reload"><i class="fa-solid fa-rotate"></i></button>
  </div>

  <div class="alert" id="alertBox"><i class="fa-solid fa-triangle-exclamation"></i> <span id="alertMsg"></span></div>

  <div id="skel" class="hidden"><div class="kpis">SKEL</div></div>
  <div class="kpis" id="kpis"></div>

  <div class="card"><h2 data-i="funnel">Conversion Funnel</h2><div class="funnel" id="funnel"></div></div>

  <div class="grid2">
    <div class="card"><h2 data-i="revchart">Doanh thu theo ngày</h2><canvas id="chRev"></canvas></div>
    <div class="card"><h2 data-i="sesschart">Phiên theo ngày</h2><canvas id="chSess"></canvas></div>
  </div>

  <div class="card">
    <h2 data-i="product">Phân tích sản phẩm</h2>
    <div class="pfilter">
      <input id="prodSearch" class="psearch" type="text" oninput="renderProducts()">
      <select id="prodSort" class="psel" onchange="onSortSel()">
        <option value="rev" data-i="p_rev">Revenue</option>
        <option value="views" data-i="p_views">Views</option>
        <option value="clicks" data-i="p_clicks">Clicks</option>
        <option value="ctr" data-i="p_ctr">CTR</option>
        <option value="cart" data-i="p_cart">Cart</option>
        <option value="units" data-i="p_units">Sold</option>
        <option value="cr" data-i="p_cr">CR</option>
      </select>
      <button id="prodDir" class="pbtn" title="" onclick="toggleDir()">↓</button>
      <select id="prodSeg" class="psel" onchange="renderProducts()">
        <option value="all" data-i="seg_all">Alle</option>
        <option value="sales" data-i="seg_sales">Mit Verkäufen</option>
        <option value="nosales" data-i="seg_nosales">Ohne Verkäufe</option>
        <option value="best" data-i="seg_best">Bestseller</option>
        <option value="lowcr" data-i="seg_lowcr">Niedrige CR</option>
        <option value="hightraffic" data-i="seg_ht">Viel Traffic, 0 Verkauf</option>
      </select>
    </div>
    <div class="pdk" id="pdKpis"></div>
    <div class="pviz">
      <div class="subcard"><h3 id="tCat"></h3><div class="subwrap"><canvas id="chCat"></canvas><div id="chCatEmpty" class="muted" style="display:none">—</div></div></div>
      <div class="subcard"><h3 id="tTop"></h3><div class="subwrap"><canvas id="chTop"></canvas><div id="chTopEmpty" class="muted" style="display:none">—</div></div></div>
    </div>
    <div style="overflow-x:auto"><table id="tblProd"><thead><tr>
      <th data-sort="name" data-i="p_product">Sản phẩm</th>
      <th class="num" data-sort="views" data-i="p_views">Views</th>
      <th class="num" data-sort="clicks" data-i="p_clicks">Clicks</th>
      <th class="num" data-sort="ctr" data-i="p_ctr">CTR</th>
      <th class="num" data-sort="cart" data-i="p_cart">Giỏ</th>
      <th class="num" data-sort="units" data-i="p_units">Bán</th>
      <th class="num" data-sort="rev" data-i="p_rev">Doanh thu</th>
      <th class="num" data-sort="cr" data-i="p_cr">CR</th>
      <th data-i="p_tag">Nhãn</th>
    </tr></thead><tbody id="bodyProd"></tbody></table></div>
  </div>

  <div class="card"><h2 data-i="customers">Khách hàng</h2><div class="kpis" id="custCards"></div></div>

  <div class="card">
    <h2 data-i="cmTitle">Rabattcodes verwalten</h2>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <input id="cmSearch" class="psearch" style="margin-bottom:0" type="text" oninput="renderCoupons()">
      <button class="btn" onclick="loadCoupons()"><i class="fa-solid fa-rotate"></i></button>
    </div>
    <div style="overflow-x:auto"><table id="tblCoupon"><thead><tr><th data-i="cm_code">Code</th><th data-i="cm_rabatt">Rabatt</th><th data-i="cm_scope">Bereich</th><th data-i="cm_status">Status</th><th data-i="cm_exp">Ablauf</th><th></th></tr></thead><tbody id="bodyCoupon2"></tbody></table></div>
  </div>

  <div id="prodDetail" class="pd-overlay hidden" onclick="if(event.target===this)closeDetail()">
    <div class="pd-card">
      <div class="pd-head"><h3 id="pdName"></h3><button onclick="closeDetail()" aria-label="close">&times;</button></div>
      <div id="pdBody" class="pd-grid"></div>
    </div>
  </div>

  <div class="foot-actions">
    <button class="btn danger" id="del7" data-i="del7">Xóa dữ liệu >7 ngày</button>
    <button class="btn danger" id="delall" data-i="delall">Xóa tất cả</button>
  </div>
</div>

<script>
const I18N={
 vi:{title:'Phân tích bán hàng',back:'Admin',today:'Hôm nay',d7:'7 ngày',d30:'30 ngày',heroT:'Tổng quan hiệu suất',apply:'Áp dụng',compare:'So sánh kỳ trước',exportcsv:'Xuất CSV',byCat:'{m} theo danh mục',topProd:'Top sản phẩm — {m}',funnel:'Phễu chuyển đổi',revchart:'Doanh thu theo ngày',sesschart:'Phiên theo ngày',product:'Phân tích sản phẩm',customers:'Khách hàng',del7:'Xóa dữ liệu >7 ngày',delall:'Xóa tất cả',search:'Tìm sản phẩm…',cmTitle:'Quản lý mã giảm giá',cm_code:'Mã',cm_rabatt:'Giảm',cm_scope:'Phạm vi',cm_status:'Trạng thái',cm_exp:'Hết hạn',sc_order:'Toàn đơn',sc_product:'Theo sản phẩm',sc_variant:'Theo biến thể',st_off:'Tắt',st_exp:'Hết hạn',st_used:'Đã dùng',st_active:'Còn hiệu lực',cm_confirm:'Xóa mã này?',seg_all:'Tất cả',seg_sales:'Có bán ra',seg_nosales:'Chưa bán',seg_best:'Bán chạy',seg_lowcr:'CR thấp',seg_ht:'Nhiều xem, 0 đơn',
  k_rev:'Doanh thu (kỳ)',k_orders:'Số đơn',k_cr:'Tỷ lệ chuyển đổi',k_aov:'Giá trị đơn TB',k_sessions:'Phiên',k_units:'SP bán ra',k_revToday:'Doanh thu hôm nay',k_revMonth:'Doanh thu tháng',
  c_new:'Khách mới',c_ret:'Khách quay lại',c_repeat:'Tỷ lệ quay lại',c_ltv:'LTV trung bình',novsprev:'so kỳ trước',
  f_view:'Lượt xem',f_click:'Click',f_cart:'Thêm giỏ',f_begin:'Bắt đầu đặt',f_pay:'Gửi đơn',f_order:'Hoàn tất',drop:'rớt',

  rows.push([]);
  rows.push(['Coupon','Uses','Discount']);
  ((d.coupons||{}).top||[]).forEach(r=>rows.push([r.code,r.c,r.d]));
  const csv='\ufeff'+rows.map(r=>r.map(csvCell).join(';')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='digitalstore-analytics-'+(d.since||'')+'_'+(d.until||'')+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
}
function gate(){ $('#app').classList.add('hidden'); const g=$('#gate'); g.classList.remove('hidden'); $('#g_title').textContent=T('gateT'); $('#g_msg').textContent=T('gateM'); $('#g_back').textContent=T('gateB'); }
function setTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem('pm_theme',t); const i=$('#themeBtn').querySelector('i'); i.className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon'; if(lastData)render(lastData); }
async function boot(){
  setTheme(localStorage.getItem('pm_theme')||'light'); applyI18n();
  if(!creds().tok){ gate(); return; }
  $('#app').classList.remove('hidden');
  await loadProductNames();
  document.querySelectorAll('#filters button[data-d]').forEach(b=>b.onclick=()=>{DAYS=+b.dataset.d;RANGE=null;$('#dFrom').value='';$('#dTo').value='';document.querySelectorAll('#filters button[data-d]').forEach(x=>x.classList.toggle('on',x===b));load();});
  $('#dApply').onclick=()=>{ const f=$('#dFrom').value,t=$('#dTo').value; if(!f||!t||f>t) return; RANGE={from:f,to:t}; document.querySelectorAll('#filters button[data-d]').forEach(x=>x.classList.remove('on')); load(); };
  $('#cmpBtn').onclick=()=>{ const on=$('#cmpBtn').classList.toggle('on'); document.body.classList.toggle('nocmp',!on); };
  $('#csvBtn').onclick=exportCSV;
  $('#reloadBtn').onclick=()=>load();
  document.querySelectorAll('#langSwitch button').forEach(b=>b.onclick=()=>{LANG=b.dataset.l;localStorage.setItem('pm_admin_lang',LANG);applyI18n();if(lastData)render(lastData);});
  $('#themeBtn').onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  document.querySelectorAll('#tblProd th[data-sort]').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}const ps=$('#prodSort');if(ps&&[...ps.options].some(o=>o.value===k))ps.value=k;const pd=$('#prodDir');if(pd)pd.textContent=sortDir<0?'↓':'↑';renderProducts();});
  $('#del7').onclick=async()=>{try{await api('/admin/stats',{method:'DELETE',body:JSON.stringify({olderThanDays:7})});load();}catch(e){}};
  $('#delall').onclick=async()=>{if(!confirm(T('confirmAll')))return;try{await api('/admin/stats',{method:'DELETE',body:JSON.stringify({all:true})});load();}catch(e){}};
  load(); loadCoupons();
}
boot();
</script>
