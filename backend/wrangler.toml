name = "store"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGIN = "https://digitalstoregin.github.io"

# KV namespace (binding ORDERS)
[[kv_namespaces]]
binding = "ORDERS"
id = "bd8530d0f1b84b58a56284db011bdc81"

# R2 bucket for proof files
[[r2_buckets]]
binding = "PROOFS"
bucket_name = "digitalstore-proof"

# SECRETS — KHÔNG ghi vào đây. Đặt bằng wrangler secret put:
#   wrangler secret put BREVO_API_KEY
#   wrangler secret put BREVO_SENDER_EMAIL
#   wrangler secret put BREVO_SENDER_NAME
#   wrangler secret put WEB3FORMS_KEY
#   wrangler secret put ADMIN_TOKEN
#   wrangler secret put ADMIN_EMAIL
#   wrangler secret put SUPPORT_EMAIL
