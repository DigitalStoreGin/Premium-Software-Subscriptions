name = "store"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGIN = "*"
PRODUCTS_URL = "https://digitalstoregin.github.io/Premium-Software-Subscriptions/products.json"
BREVO_SENDER_EMAIL = "cfvblue@gmail.com"
BREVO_SENDER_NAME = "DigitalStore"
ADMIN_EMAIL = "cfvblue@gmail.com"
SUPPORT_EMAIL = "cfvblue@gmail.com"

# KV namespace (binding ORDERS)
[[kv_namespaces]]
binding = "ORDERS"
id = "bd8530d0f1b84b58a56284db011bdc81"

# R2 bucket for proof files
[[r2_buckets]]
binding = "PROOFS"
bucket_name = "digitalstore-proof"

# SECRETS (chỉ 4 giá trị nhạy cảm — phải set bằng wrangler secret put):
#   wrangler secret put BREVO_API_KEY
#   wrangler secret put WEB3FORMS_KEY
#   wrangler secret put ADMIN_TOKEN
#   wrangler secret put ADMIN_PASS_HASH
#   wrangler secret put DEEPL_API_KEY   (tùy chọn — để tự dịch email DE→EN/RU; gói free DeepL, key kết thúc bằng :fx)

[[d1_databases]]
binding = "DB"
database_name = "digitalstore-proof"
database_id = "0cb47552-de0b-4a50-84e8-7f78da767013"
